<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
  <link rel="manifest" href="img/site.webmanifest">
  <title>NoteZ</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/main.css">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">NoteZ</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavDropdown"
        aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <i class="uil uil-bars" style="font-size: 1.5rem; color: var(--primary-color);"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavDropdown">
        <ul class="navbar-nav mr-auto align-items-lg-center">
          <li class="nav-item active">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="https://sivajr.netlify.app/" target="_blank">About</a>
          </li>
          <li class="nav-item ml-lg-3 mt-3 mt-lg-0 mb-3 mb-lg-0">
            <a href="https://play.google.com/store/apps/details?id=com.feline.notes"
              class="btn btn-primary btn-sm rounded-pill px-3 py-2 font-weight-bold shadow-sm d-inline-flex align-items-center"
              target="_blank"
              style="background: linear-gradient(135deg, #FFD60A, #E6C200); border: none; color: #0f172a !important;">
              <i class="uil uil-mobile-android mr-1"></i> Get App
            </a>
          </li>
        </ul>
        <form class="form-inline my-2 my-lg-0" onsubmit="event.preventDefault(); window.search();">
          <div class="input-group">
            <div class="input-group-prepend">
              <span class="input-group-text border-0" id="search-addon"><i class="uil uil-search"
                  style="color: var(--placeholder-color);"></i></span>
            </div>
            <input class="form-control border-0" type="search" placeholder="Search notes..." aria-label="Search"
              id="search_note" required>
          </div>
        </form>
      </div>
    </div>
  </nav>

  <!-- Main Content Wrapper -->
  <div class="container main-wrapper" style="margin-top: 80px;">

    <!-- Actions -->
    <div class="cloud">
      <button class="btn" id="import" onclick="restore()"><i class="uil uil-import mr-2"></i>Import</button>
      <button class="btn" id="export" onclick="backup()"><i class="uil uil-export mr-2"></i>Export</button>
    </div>

    <!-- Add Note Section -->
    <section id="add_now">
      <div class="add_note" id="add_note">
        <h3 class="nthree_add">Capture your thoughts</h3>
        <form onsubmit="event.preventDefault(); add();">
          <div class="form-group">
            <input type="text" class="addn_title form-control" id="addn_title" placeholder="Note Title">
          </div>
          <div class="form-group">
            <textarea class="add_detail form-control" id="add_detail" rows="4" placeholder="Write something amazing..."
              required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block action_btn btn-add">Add Note</button>
        </form>
      </div>
    </section>

    <!-- Notes View -->
    <section>
      <div class="no_notes text-center" id="no_notes">
        <img src="img/no-items.png" class="img-fluid no_notes_img" alt="no notes" id="no_notes_img">
        <p id="noText">No notes available right now. Time to write! ✍️</p>
      </div>

      <div class="view_notes" id="view_notes">
        <!-- Notes are injected here dynamically via JS -->
      </div>
    </section>

  </div>

  <!-- Note View Modal -->
  <div class="modal fade" id="viewNoteModal" tabindex="-1" aria-labelledby="viewNoteModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title" id="noteViewTitle">Note Title</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
            <p id="noteViewDate" class="note-date mb-3 d-inline-block"></p>
            <div id="noteViewContent" class="note-popup-content">
                <!-- Content injected here -->
            </div>
        </div>
        <div class="modal-footer border-0 pt-0">
            <button type="button" id="editFromModal" class="btn btn-primary rounded-pill px-4 shadow-sm" style="background: var(--primary-color); border: none;">Edit Note</button>
            <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Theme Toggle -->
  <a href="#" class="float" id="theme-float">
    <i class="uil uil-moon change-theme" id="theme-button"></i>
  </a>

  <!-- Scripts -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="Js/home.js"></script>
</body>

</html>
